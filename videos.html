---
layout: default
title: Teaching Points by Video
permalink: /videos/
---

<h1>🎬 Teaching Points by Video</h1>

<div class="mb-4">
  <div class="d-flex flex-wrap gap-3 align-items-center mb-2">
    <label class="fw-semibold mb-0" style="min-width:110px;">Video</label>
    <input type="search" id="video-search" class="form-control w-auto"
           placeholder="Search by title…" style="min-width:240px;">
    <select id="video-select" class="form-select w-auto" style="min-width:240px;">
      <option value="">— All videos —</option>
    </select>
  </div>
  <div class="d-flex flex-wrap gap-3 align-items-center">
    <label class="fw-semibold mb-0" style="min-width:110px;">Teaching Point</label>
    <input type="search" id="tp-search" class="form-control w-auto"
           placeholder="Search by name…" style="min-width:240px;">
    <select id="tp-select" class="form-select w-auto" style="min-width:240px;">
      <option value="">— All teaching points —</option>
    </select>
  </div>
  <span id="video-count" class="text-muted small mt-2 d-block"></span>
</div>

<div id="video-list" class="container-fluid px-0"></div>
<div id="lazy-sentinel" style="height: 50px;"></div>

<script>
(function () {
  const allVideos = {{ site.data["teaching_points_by_video"] | jsonify | safe }};

  // Only videos that have at least one teaching point
  const videosWithTPs = allVideos.filter(v => v.teachingPoints && v.teachingPoints.length > 0);

  const container   = document.getElementById("video-list");
  const sentinel    = document.getElementById("lazy-sentinel");
  const videoSearch = document.getElementById("video-search");
  const videoSelect = document.getElementById("video-select");
  const tpSearch    = document.getElementById("tp-search");
  const tpSelect    = document.getElementById("tp-select");
  const countLabel  = document.getElementById("video-count");

  let currentVideos = [];
  let loadedCount   = 0;
  const batchSize   = 2;

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function resetVideo(id) {
    const el = document.getElementById(id);
    if (el) el.parentNode.replaceChild(el.cloneNode(true), el);
  }
  window.resetVideo = resetVideo;

  function renderNextBatch() {
    const batch = currentVideos.slice(loadedCount, loadedCount + batchSize);
    if (batch.length === 0) return;

    batch.forEach(video => {
      const section = document.createElement("div");
      section.className = "mb-5";

      const tpRows = video.teachingPoints.map(tp => {
        const iframeId = `vid-${esc(tp.video)}-${tp.startTime}-${tp.endTime}`;
        return `
          <div class="row mb-4 border rounded p-3 align-items-start">
            <div class="col-md-6">
              <div class="ratio ratio-16x9">
                <iframe
                  id="${iframeId}"
                  src="${esc(tp.embed_url)}"
                  title="${esc(tp.teachingPoint_name)}"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowfullscreen>
                </iframe>
              </div>
            </div>
            <div class="col-md-6">
              <h6 class="mb-1">${esc(tp.teachingPoint_id)} – ${esc(tp.teachingPoint_name)}</h6>
              <p class="text-muted small mb-1"><strong>Duration:</strong> ${esc(tp.duration)}</p>
              ${tp.teachingPoint_short_description
                ? `<p class="small">${esc(tp.teachingPoint_short_description)}</p>`
                : ""}
              <button class="btn btn-outline-secondary btn-sm"
                      onclick="resetVideo('${iframeId}')">🔁 Reset</button>
            </div>
          </div>`;
      }).join("");

      section.innerHTML = `
        <h2 class="h4 mb-1">
          <a href="${esc(video.url)}" target="_blank" rel="noopener">${esc(video.title)}</a>
        </h2>
        <p class="text-muted small mb-3">
          ${esc(video.uploadDate)}
          &nbsp;·&nbsp; ${video.teachingPoints.length} teaching point${video.teachingPoints.length !== 1 ? "s" : ""}
        </p>
        ${tpRows}
        <hr>`;

      container.appendChild(section);
    });

    loadedCount += batchSize;
  }

  function initVideos(videos) {
    currentVideos = videos;
    loadedCount   = 0;
    container.innerHTML = "";
    countLabel.textContent = `${videos.length} video${videos.length !== 1 ? "s" : ""}`;
    renderNextBatch();
  }

  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) renderNextBatch();
  });

  function clearVideoFilters()  { videoSearch.value = ""; videoSelect.value = ""; }
  function clearTpFilters()     { tpSearch.value = "";    tpSelect.value = ""; }

  function updateUrl() {
    const params = new URLSearchParams();
    if (videoSelect.value) params.set("v",  videoSelect.value);
    if (tpSelect.value)    params.set("tp", tpSelect.value);
    const qs = params.toString();
    history.replaceState(null, "", qs ? "?" + qs : window.location.pathname);
  }

  function applyFilters() {
    const vq   = videoSearch.value.trim().toLowerCase();
    const vid  = videoSelect.value;
    const tq   = tpSearch.value.trim().toLowerCase();
    const tpid = tpSelect.value;

    let filtered = videosWithTPs.map(v => ({ ...v, teachingPoints: v.teachingPoints.slice() }));

    // Video filters
    if (vid) filtered = filtered.filter(v => v.videoId === vid);
    if (vq)  filtered = filtered.filter(v => v.title && v.title.toLowerCase().includes(vq));

    // TP filters — narrow TPs within each video, then drop empty videos
    if (tpid || tq) {
      filtered = filtered
        .map(v => ({
          ...v,
          teachingPoints: v.teachingPoints.filter(tp => {
            if (tpid) return tp.teachingPoint_id === tpid;
            return (tp.teachingPoint_name || "").toLowerCase().includes(tq) ||
                   (tp.teachingPoint_short_description || "").toLowerCase().includes(tq);
          })
        }))
        .filter(v => v.teachingPoints.length > 0);
    }

    initVideos(filtered);
  }

  document.addEventListener("DOMContentLoaded", () => {
    // Populate video dropdown
    videosWithTPs.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v.videoId;
      opt.textContent = v.title.length > 70 ? v.title.slice(0, 67) + "…" : v.title;
      videoSelect.appendChild(opt);
    });

    // Populate TP dropdown (all TPs across all videos, sorted by ID)
    const allTPs = videosWithTPs.flatMap(v => v.teachingPoints);
    allTPs.sort((a, b) => a.teachingPoint_id.localeCompare(b.teachingPoint_id, undefined, { numeric: true }));
    allTPs.forEach(tp => {
      const opt = document.createElement("option");
      opt.value = tp.teachingPoint_id;
      const label = `${tp.teachingPoint_id} – ${tp.teachingPoint_name}`;
      opt.textContent = label.length > 70 ? label.slice(0, 67) + "…" : label;
      tpSelect.appendChild(opt);
    });

    // Pre-filter from URL params ?v= and ?tp=
    const params = new URLSearchParams(window.location.search);
    if (params.get("v"))  videoSelect.value = params.get("v");
    if (params.get("tp")) tpSelect.value    = params.get("tp");

    applyFilters();
    observer.observe(sentinel);

    videoSearch.addEventListener("input",  () => { clearTpFilters();    updateUrl(); applyFilters(); });
    videoSelect.addEventListener("change", () => { clearTpFilters();    videoSearch.value = ""; updateUrl(); applyFilters(); });
    tpSearch.addEventListener("input",     () => { clearVideoFilters(); updateUrl(); applyFilters(); });
    tpSelect.addEventListener("change",    () => { clearVideoFilters(); tpSearch.value = "";    updateUrl(); applyFilters(); });
  });
})();
</script>
